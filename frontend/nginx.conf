server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # für statische Seiten: fallback auf index.html (hilft auch bei “SPA”-Routen)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # caching für assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot|glb)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
